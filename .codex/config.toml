[features]
multi_agent = true

[orchestration]
mode = "lead_orchestrated"
ssot = ["codebase", "tasks/prd-*.md", "tasks/trd-*.md", "tasks/tasks-*.md", "tasks/dag-*.json", "tasks/stacks.json"]
command = "./scripts/lead-orchestrate.sh --project-dir . --tasks-file <tasks-file> --dag-file <dag-file> --approve"
replan_trigger = "failure_or_blocker"
allow_replan_on_success = false
merge_strategy = "dependency_order"
pr_granularity = "one_task_one_pr"

[orchestration.plan_contract]
required_fields = [
  "task_id",
  "dependencies",
  "parallel_safe",
  "gate_stacks",
  "risk_level",
  "ready",
  "stage",
  "wave",
]

[orchestration.status_contract]
required_fields = [
  "task_id",
  "agent_id",
  "status",
  "attempt",
  "gate_passed",
  "pr_review_passed",
  "blocked_reason",
  "stage",
  "wave",
  "profile",
  "profile_fallback",
]

[gate]
command = "./scripts/check.sh --stacks auto"

[actor]
stage_model = "IDEATION,PRD,TRD,TASK_PLANNING,ORCHESTRATION,IMPLEMENTATION,QA,DEPLOYMENT"
adjacency_only = true
self_heal_relay = "QA->IMPLEMENTATION->ORCHESTRATION"
blackboard_root = ".blackboard"

[agents.lead]
role = "development_lead"
permissions = "read_only"
can_propose = true
can_modify_files = false
deterministic_order = "task_id"
skills = ["orchestrate-tasks"]

[agents.sub_agent]
role = "task_executor"
task_scope = "single_task"
skills = ["process-task", "fix-failing-checks", "pr-review"]
fix_retry_limit = 3
rework_on_review_priorities = ["P1", "P2"]
rework_max_rounds = 1
tdd_required = true
preferred_profile = "fast"

[agents.sub_agent.ralph]
enabled = true
completion_signal = "LOOP_COMPLETE"
max_iterations = 8
max_runtime_minutes = 30
