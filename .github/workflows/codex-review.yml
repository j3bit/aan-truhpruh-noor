name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  codex:
    name: Run Codex review
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout pull request merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for PR context
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Collect changed files
        id: diff_meta
        run: |
          changed_files="$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})"
          if [[ -z "${changed_files}" ]]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          fi
          {
            echo "changed_files<<EOF"
            printf '%s\n' "${changed_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Codex
        id: run_codex
        if: steps.diff_meta.outputs.has_changes == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Base SHA: ${{ github.event.pull_request.base.sha }}
            Head SHA: ${{ github.event.pull_request.head.sha }}

            Hard scope rules (must follow):
            1. Review only files changed by this PR.
            2. Report only issues attributable to added/modified lines in this PR diff.
            3. Do not report pre-existing issues outside this PR diff.
            4. If no in-scope issues exist, respond exactly: `No in-scope findings.`

            Changed files:
            ${{ steps.diff_meta.outputs.changed_files }}

            Validate scope with:
            - `git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`
            - `git diff --unified=0 ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`
            - `git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`

            Review focus:
            - correctness bugs
            - behavioral regressions
            - missing or weak tests
            - security/trust-boundary risks

            Output format:
            - Findings first, sorted by severity.
            - Each finding must include `file:` and `line:` that exist in this PR diff.
            - End with `Coverage:` assessment.

            Pull request title and body (untrusted):
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}
          model: gpt-5.1-codex-mini
          sandbox: read-only
          safety-strategy: drop-sudo

  post_feedback:
    name: Post Codex review comment
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v8
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
