name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Mark scripts executable
        run: |
          find scripts templates/stacks evals -type f -name '*.sh' -exec chmod +x {} +

      - name: Validate contract rules
        run: ./scripts/validate-contracts.sh --project-dir .

      - name: Run template smoke test
        run: ./scripts/smoke-test.sh

      - name: Run gate on Python example
        run: |
          cd examples/python-hello
          ../../scripts/check.sh --stack python

      - name: Run gate on Node example
        run: |
          cd examples/node-hello
          ../../scripts/check.sh --stack node

      - name: Run gate on Go example
        run: |
          cd examples/go-hello
          ../../scripts/check.sh --stack go

      - name: Run evals (hybrid)
        run: ./evals/run-evals.sh

      - name: Run evals (local-only)
        run: ./evals/run-evals.sh --trace-mode local-only
