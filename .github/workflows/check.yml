name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Mark scripts executable
        run: |
          find scripts templates/stacks evals -type f -name '*.sh' -exec chmod +x {} +

      - name: Validate contract rules
        run: ./scripts/validate-contracts.sh --project-dir .

      - name: Run template smoke test
        run: ./scripts/smoke-test.sh

      - name: Run root gate (if stack marker exists)
        run: |
          if [[ -f go.mod ]]; then
            echo "[ci] detected stack=go"
            ./scripts/check.sh --stack go
          elif [[ -f package.json ]]; then
            echo "[ci] detected stack=node"
            ./scripts/check.sh --stack node
          elif [[ -f pyproject.toml || -f requirements.txt || -f setup.py ]] || find . -maxdepth 1 -type f -name '*.py' -print -quit | grep -q .; then
            echo "[ci] detected stack=python"
            ./scripts/check.sh --stack python
          else
            echo "[ci] no root stack marker found; skipping root gate"
          fi

      - name: Run evals (hybrid)
        run: ./evals/run-evals.sh

      - name: Run evals (local-only)
        if: ${{ github.event_name == 'push' }}
        run: ./evals/run-evals.sh --trace-mode local-only
